<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0E2A1F" />
  <meta name="color-scheme" content="dark" />

  <!-- Default title and description. Until SSG ships in Session 5, this is what
       link-preview scrapers (iMessage, Slack, LinkedIn, etc.) see for ALL routes,
       because they don't run JS. The per-route updates in Meta.jsx happen
       post-hydration and are visible only to live browsers. So we keep these
       defaults sitewide-safe (brand-led, not copy-led). -->
  <title>Forecite · Get recommended by AI</title>
  <meta name="description" content="Generative engine optimization. We get your business recommended by ChatGPT, Claude, Google AI Overviews, Perplexity, Gemini, and Bing Copilot." />

  <!-- Canonical default; per-route Meta updates this on navigation. -->
  <link rel="canonical" href="https://forecite.agency/" />

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Open Graph. og:image is intentionally brand-only (no copy baked in)
       so link previews don't go stale when we revise headlines. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Forecite" />
  <meta property="og:title" content="Forecite · Get recommended by AI" />
  <meta property="og:description" content="Generative engine optimization. We get your business recommended by ChatGPT, Claude, Google AI Overviews, Perplexity, Gemini, and Bing Copilot." />
  <meta property="og:url" content="https://forecite.agency/" />
  <meta property="og:image" content="https://forecite.agency/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Forecite. Generative engine optimization." />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Forecite · Get recommended by AI" />
  <meta name="twitter:description" content="Generative engine optimization. We get your business recommended by ChatGPT, Claude, Google AI Overviews, Perplexity, Gemini, and Bing Copilot." />
  <meta name="twitter:image" content="https://forecite.agency/og-image.png" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
