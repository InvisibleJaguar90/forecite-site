<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0E2A1F" />
  <meta name="color-scheme" content="dark" />

  <!-- Default title and description; per-route overrides set in <Meta> on each page. -->
  <title>Forecite · When customers ask AI, you're the answer.</title>
  <meta name="description" content="Forecite is a generative engine optimization agency. We make sure your business is cited when customers ask ChatGPT, Claude, Google AI Overviews, Perplexity, Gemini, and Bing Copilot." />

  <!-- Canonical default; per-route Meta updates this on navigation. -->
  <link rel="canonical" href="https://forecite.agency/" />

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Forecite" />
  <meta property="og:title" content="Forecite · When customers ask AI, you're the answer." />
  <meta property="og:description" content="Generative engine optimization for businesses that want to be cited in the answer." />
  <meta property="og:url" content="https://forecite.agency/" />
  <meta property="og:image" content="https://forecite.agency/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Forecite. Generative engine optimization." />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Forecite · When customers ask AI, you're the answer." />
  <meta name="twitter:description" content="Generative engine optimization for businesses that want to be cited in the answer." />
  <meta name="twitter:image" content="https://forecite.agency/og-image.png" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
